name: Sync Project Statuses

on:
  schedule:
    # รันทุก 30 นาที เพื่อความปลอดภัย
    - cron: '*/30 * * * *'
  workflow_dispatch:
    # อนุญาตให้กดรันเองได้จากหน้า Actions หรือถูกสะกิดมาจาก Repo อื่น

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run sync script
        env:
          # ใช้ Token ที่มีสิทธิ์จัดการ Project และ Repo ต่างๆ
          GH_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
        run: |
          python3 scripts/sync-automation/sync_projects.py --apply
